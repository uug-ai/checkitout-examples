name: Publish Plugin to Cloudflare R2

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload checkout-plugin.css to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put
            ${{ secrets.R2_BUCKET_NAME }}/checkout-plugin/${{ github.event.release.tag_name || inputs.version }}/checkout-plugin.css
            --file app/public/assets/checkout-plugin.css
            --content-type text/css

      - name: Upload checkout-plugin.umd.cjs to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put
            ${{ secrets.R2_BUCKET_NAME }}/checkout-plugin/${{ github.event.release.tag_name || inputs.version }}/checkout-plugin.umd.cjs
            --file app/public/assets/checkout-plugin.umd.cjs
            --content-type application/javascript

      - name: Upload latest aliases
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put
            ${{ secrets.R2_BUCKET_NAME }}/checkout-plugin/latest/checkout-plugin.css
            --file app/public/assets/checkout-plugin.css
            --content-type text/css

      - name: Upload latest JS alias
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put
            ${{ secrets.R2_BUCKET_NAME }}/checkout-plugin/latest/checkout-plugin.umd.cjs
            --file app/public/assets/checkout-plugin.umd.cjs
            --content-type application/javascript
